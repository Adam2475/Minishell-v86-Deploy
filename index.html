<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>42_Minishell</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <main class="layout">
        <section class="hero">
            <!-- <p class="eyebrow">42 project, browser-hosted</p> -->
            <h1>Try Minishell</h1>
            <p class="lede">
                This page uses v86 to virtualize a Linux enviroment on your browser.
            </p>

            <div class="actions">
                <button id="start-emulator" class="button button-primary" type="button">Start demo</button>
                <button id="pause-emulator" class="button button-secondary" type="button" disabled>Pause</button>
                <button id="resume-emulator" class="button button-secondary" type="button" disabled>Resume</button>
                <button id="restart-emulator" class="button button-secondary" type="button" disabled>Restart</button>
            </div>
        </section>

        <section class="terminal-panel">
            <div class="panel-header">
                <div>
                    <p class="panel-title">Interactive VM</p>
                    <p id="status-line" class="panel-subtitle">Idle. Press start to begin.</p>
                </div>
                <span id="asset-mode" class="badge">Waiting for assets</span>
            </div>

            <div id="screen_container" class="screen-shell">
                <div class="screen-text"></div>
                <canvas></canvas>
            </div>

            <p class="hint">
                After boot (3–5 min), click inside the VGA screen above to interact with minishell.
                Use <strong>Ctrl</strong> + <strong>Alt</strong> to release keyboard focus.
            </p>

            <form id="mobile-shell-form" class="mobile-input-wrap" autocomplete="off">
                <label for="mobile-shell-input" class="mobile-input-label">Mobile input</label>
                <div class="mobile-input-row">
                    <input id="mobile-shell-input" class="mobile-shell-input" type="text" inputmode="text" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="Type command, then tap Send" />
                    <button id="mobile-shell-send" class="mobile-shell-send" type="submit">Send</button>
                </div>
            </form>

        </section>
    </main>

    <script src="./assets/libv86.js"></script>
    <script type="module" src="./app.js"></script>
</body>
</html>
